<svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
  <symbol id="disk" viewBox="0 0 28 28">
    <!-- outer body -->
    <rect x="0" y="0" width="28" height="28" rx="2" fill="currentColor"/>
    <!-- label area -->
    <rect x="3" y="0" width="16" height="12" rx="1" fill="white" opacity="0.85"/>
    <!-- label lines -->
    <rect x="5" y="3" width="10" height="1.5" rx="0.5" fill="currentColor" opacity="0.4"/>
    <rect x="5" y="6" width="8" height="1.5" rx="0.5" fill="currentColor" opacity="0.4"/>
    <rect x="5" y="9" width="9" height="1.5" rx="0.5" fill="currentColor" opacity="0.4"/>
    <!-- write-protect tab -->
    <rect x="19" y="0" width="6" height="9" rx="1" fill="white" opacity="0.5"/>
    <rect x="20" y="1" width="4" height="7" rx="0.5" fill="currentColor" opacity="0.3"/>
    <!-- metal shutter -->
    <rect x="7" y="16" width="14" height="10" rx="1" fill="white" opacity="0.55"/>
    <!-- shutter slot -->
    <rect x="11" y="18" width="6" height="5" rx="0.5" fill="currentColor" opacity="0.45"/>
  </symbol>
</svg>
